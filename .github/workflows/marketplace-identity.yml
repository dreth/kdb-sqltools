name: Get Marketplace Identity ID

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  get-marketplace-identity:
    name: Get Marketplace identity ID
    runs-on: ubuntu-latest
    environment: marketplace

    steps:
      - name: Azure login with GitHub OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Print Marketplace profile ID to add as publisher contributor
        run: |
          set -euo pipefail
          az rest \
            --method get \
            --url "https://app.vssps.visualstudio.com/_apis/profile/profiles/me" \
            --resource "499b84ac-1321-427f-aa17-267ca6975798" \
            --query "{id:id, displayName:displayName, publicAlias:publicAlias}" \
            --output json
