site_name: kdb-sqltools
site_url: https://kdb-sqltools.dac.sg/
repo_url: https://github.com/dreth/kdb-sqltools
repo_name: dreth/kdb-sqltools
site_description: Practical documentation for the SQLTools kdb driver.
docs_dir: mkdocs-src
site_dir: docs
exclude_docs: |
  README.md
  requirements.txt

theme:
  name: material
  palette:
    - scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: lime
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - tables

nav:
  - Overview: index.md
  - Installation: installation.md
  - Connections: connections.md
  - Running q: running-q.md
  - Results panel: results-panel.md
  - Local data server: local-data-server.md
  - Charting: charting.md
  - Copy and export: copy-export.md
  - Settings: settings.md
  - Troubleshooting: troubleshooting.md
  - Feedback: feedback.md
